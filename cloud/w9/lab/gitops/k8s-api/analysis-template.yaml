apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: api-success-rate
  namespace: demo
spec:
  metrics:
    - name: api-success-rate
      interval: 20s
      count: 3
      failureLimit: 1
      successCondition: result[0] >= 0.95
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
          query: |
            (
              sum(rate(flask_http_request_total{namespace="demo", service="api", status!~"5.."}[1m]))
              /
              sum(rate(flask_http_request_total{namespace="demo", service="api"}[1m]))
            ) or vector(1)
