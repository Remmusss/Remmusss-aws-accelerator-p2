apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-be-backend
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: fe-be-backend
  template:
    metadata:
      labels:
        app: fe-be-backend
    spec:
      containers:
        - name: backend
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/app.py
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: backend-app
              mountPath: /app/app.py
              subPath: app.py
              readOnly: true
      volumes:
        - name: backend-app
          configMap:
            name: fe-be-backend-app
---
apiVersion: v1
kind: Service
metadata:
  name: fe-be-backend
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: fe-be-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
