apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-be-frontend
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fe-be-frontend
  template:
    metadata:
      labels:
        app: fe-be-frontend
      annotations:
        config-version: source-files-v3
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: frontend-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: frontend-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: frontend-config
          configMap:
            name: fe-be-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: fe-be-frontend
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: NodePort
  selector:
    app: fe-be-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
