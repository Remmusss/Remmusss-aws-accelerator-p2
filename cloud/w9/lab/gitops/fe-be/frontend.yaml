apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-be-frontend-config
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;

      location / {
        try_files $uri /index.html;
      }

      location /api/ {
        proxy_pass http://fe-be-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>W9 GitOps FE/BE</title>
      <style>
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: Georgia, "Times New Roman", serif;
          background: radial-gradient(circle at top left, #e6f5ff, transparent 34%),
            linear-gradient(135deg, #102a43, #243b53);
          color: #f8fafc;
        }
        main {
          width: min(720px, calc(100% - 32px));
          padding: 36px;
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 24px;
          background: rgba(15, 23, 42, 0.72);
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }
        h1 {
          margin: 0 0 12px;
          font-size: clamp(32px, 6vw, 64px);
          line-height: 0.95;
        }
        pre {
          overflow: auto;
          padding: 16px;
          border-radius: 12px;
          background: #08111f;
          color: #b7f7d4;
        }
      </style>
    </head>
    <body>
      <main>
        <p>Argo CD app-of-apps demo</p>
        <h1>Frontend calls backend through Kubernetes Service</h1>
        <pre id="result">Loading backend response...</pre>
      </main>
      <script>
        fetch("/api/")
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("result").textContent = JSON.stringify(data, null, 2);
          })
          .catch((error) => {
            document.getElementById("result").textContent = error.toString();
          });
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-be-frontend
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fe-be-frontend
  template:
    metadata:
      labels:
        app: fe-be-frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: frontend-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: frontend-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: frontend-config
          configMap:
            name: fe-be-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: fe-be-frontend
  namespace: demo-fe-be
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: NodePort
  selector:
    app: fe-be-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
