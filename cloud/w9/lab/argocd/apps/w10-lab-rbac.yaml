apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w10-lab-rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Remmusss/Remmusss-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w10/lab/rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true