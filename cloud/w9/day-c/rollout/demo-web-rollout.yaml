apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-web-rollout
  namespace: lab
  labels:
    app: demo-web-rollout
    app.kubernetes.io/name: demo-web-rollout
    app.kubernetes.io/part-of: w9-platform
spec:
  replicas: 5
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: demo-web-rollout
  template:
    metadata:
      labels:
        app: demo-web-rollout
        app.kubernetes.io/name: demo-web-rollout
        app.kubernetes.io/part-of: w9-platform
    spec:
      containers:
        - name: demo-web
          image: demo-web-metrics:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_NAME
              value: demo-web-rollout
            - name: APP_VERSION
              value: v1
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: demo-web-prometheus-analysis
        - setWeight: 50
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: demo-web-prometheus-analysis
        - setWeight: 100
