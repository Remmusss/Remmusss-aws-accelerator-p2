apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer
  namespace: app-dev
subjects:
  - kind: ServiceAccount
    name: developer-sa
    namespace: app-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: developer
