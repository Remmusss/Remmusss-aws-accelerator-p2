apiVersion: v1
kind: Pod
metadata:
  name: valid-w10-pod
  namespace: app-dev
  labels:
    owner: platform-team
    app.kubernetes.io/name: valid-w10-pod
    app.kubernetes.io/part-of: w10-platform
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

