apiVersion: v1
kind: Pod
metadata:
  name: invalid-privileged-pod
  namespace: app-dev
  labels:
    owner: platform-team
    app.kubernetes.io/name: invalid-privileged-pod
    app.kubernetes.io/part-of: w10-platform
spec:
  containers:
    - name: app
      image: nginx:1.27-alpine
      securityContext:
        privileged: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

