apiVersion: v1
kind: LimitRange
metadata:
  name: app-dev-defaults
  namespace: app-dev
  labels:
    app.kubernetes.io/name: app-dev-defaults
    app.kubernetes.io/part-of: w10-platform
    owner: platform-team
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi

