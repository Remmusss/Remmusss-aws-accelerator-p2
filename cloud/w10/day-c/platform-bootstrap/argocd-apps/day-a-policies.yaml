apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w10-day-a-policies
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Remmusss/Remmusss-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w10/day-a/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

